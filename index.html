<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2 Flying Training School</title>
    <meta
      name="description"
      content="A mobile-first landing page for 2 Flying Training School with direct links to the organisation applications."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/www/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/www/favicon.svg" />
    <link rel="shortcut icon" href="/www/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/www/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="2FTS" />
    <link rel="manifest" href="/www/site.webmanifest" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header reveal delay-1">
        <div class="brand">
          <img
            class="brand-crest"
            src="assets/2fts-kc-crest.png"
            alt="2 Flying Training School crest"
          >
          <div class="brand-copy">
          <p class="brand-kicker">Royal Air Force</p>
          <p class="brand-name">2 Flying Training School</p>
          </div>
        </div>
      </header>

      <main class="hero-layout">
        <nav class="hero-panel reveal delay-2" aria-label="Applications">
          <a class="button button-primary" href="https://2fts-raf.github.io/strop-drop">
            <span class="button-icon" aria-hidden="true">
              <img src="assets/strop-drop-icon.svg" alt="">
            </span>
            <span class="button-label">Strop Drop App</span>
          </a>

          <a class="button button-secondary" href="https://2fts-raf.github.io/ballast">
            <span class="button-icon" aria-hidden="true">
              <img src="assets/ballast-icon.svg" alt="">
            </span>
            <span class="button-label">Ballast Weight App</span>
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
